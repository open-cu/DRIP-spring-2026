spring:
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    hibernate:
      # Удаляет и создаёт схему при старте приложения
      # В продакшене не используйте create или update — лучше использовать миграции (например, Flyway или Liquibase).
      ddl-auto: create
      naming:
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    show-sql: true
  application:
    name: spring-hiber-demo6
  h2:
    console:
      enabled: true
      path: /h2-console
  # подключение in memory базы данных
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  # конфигурация JPA
logging:
  level:
    root: info

