<!DOCTYPE html>
<!--suppress HtmlUnknownAttribute, HtmlRequiredLangAttribute -->
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{all-authors}">Authors</title>
    <link rel="stylesheet" href="../../static/css/style.css" th:href="@{/css/style.css}" />
</head>
<body>
    <h1 th:text="#{all-authors}">All Authors</h1>

    <p><a href="../articles/list.html" th:href="@{/articles}" th:text="#{back-to-articles-list}">Back to Articles List</a></p>

    <table>
        <thead>
            <tr>
                <th th:text="#{id-column}">ID</th>
                <th th:text="#{name-column}">Name</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="author : ${authors}">
                <td th:text="${author.id}"></td>
                <td th:text="${author.name}"></td>
            </tr>
        </tbody>
    </table>

    <p><a href="../articles/list.html" th:href="@{/articles}" th:text="#{back-to-articles-list}">Back to Articles List</a></p>
</body>
</html>
